<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>염소 클릭 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 사용자 정의 스타일 */
        body {
            font-family: 'Inter', sans-serif;
            touch-action: manipulation; /* 모바일에서 더블 탭 확대 방지 */
        }
        .game-container {
            width: 95%;
            max-width: 800px;
            height: 600px;
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease-in-out;
            padding: 1rem;
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
        #goat {
            position: absolute;
            cursor: pointer;
            width: 100px;
            height: 100px;
            user-select: none; /* 이미지 드래그 방지 */
            -webkit-user-drag: none; /* Safari에서 이미지 드래그 방지 */
            transition: top 0.2s ease-out, left 0.2s ease-out, transform 0.1s ease-in-out;
        }
        #goat:active {
            transform: scale(0.9);
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1.125rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="game-container bg-gradient-to-br from-blue-300 to-purple-300 p-4">

        <!-- 시작 화면 -->
        <div id="start-screen" class="screen">
            <h1 class="text-5xl font-bold text-white mb-4 text-center">염소 클릭 게임</h1>
            <p class="text-xl text-white mb-8">30초 안에 염소를 최대한 많이 클릭하세요!</p>
            <button id="start-btn" class="btn bg-green-500 hover:bg-green-600">게임 시작</button>
        </div>

        <!-- 게임 화면 -->
        <div id="game-screen" class="screen hidden justify-start items-stretch">
            <div class="flex justify-between items-center p-4 bg-white/30 rounded-lg backdrop-blur-sm mb-4">
                <h2 class="text-2xl font-bold text-white">점수: <span id="score">0</span></h2>
                <h2 class="text-2xl font-bold text-white">남은 시간: <span id="time">30</span>초</h2>
            </div>
            <div id="game-area" class="relative flex-grow">
                <img src="goat.jpg" alt="염소" id="goat" class="rounded-full shadow-lg" onerror="this.onerror=null;this.src='https://placegoat.com/100/100';">
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="screen hidden text-center">
            <h1 class="text-5xl font-bold text-white mb-4">게임 종료!</h1>
            <p class="text-3xl text-white mb-6">최종 점수: <span id="final-score">0</span>점</p>
            
            <!-- Gemini API 결과 표시 영역 -->
            <div id="gemini-response-container" class="mt-4 p-4 bg-white/20 rounded-lg min-h-[100px] max-w-md mx-auto flex items-center justify-center text-center">
                <p id="gemini-response-text" class="text-white text-lg"></p>
                <div id="loading-spinner" class="hidden animate-spin rounded-full h-8 w-8 border-b-2 border-white"></div>
            </div>

            <!-- 버튼 그룹 -->
            <div class="flex flex-wrap justify-center gap-4 mt-6">
                <button id="restart-btn" class="btn bg-blue-500 hover:bg-blue-600">다시하기</button>
                <button id="get-commentary-btn" class="btn bg-purple-500 hover:bg-purple-600">✨ 다른 평가 보기</button>
                <button id="get-fact-btn" class="btn bg-teal-500 hover:bg-teal-600">🐐 염소 상식 보기</button>
            </div>
        </div>

    </div>

    <script>
        // 화면 요소
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const resultScreen = document.getElementById('result-screen');

        // 버튼
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const getCommentaryBtn = document.getElementById('get-commentary-btn');
        const getFactBtn = document.getElementById('get-fact-btn');

        // 디스플레이
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const finalScoreDisplay = document.getElementById('final-score');
        
        // 게임 영역
        const goat = document.getElementById('goat');
        const gameArea = document.getElementById('game-area');

        // Gemini API 관련 요소
        const geminiResponseText = document.getElementById('gemini-response-text');
        const loadingSpinner = document.getElementById('loading-spinner');

        // 게임 상태 변수
        let score = 0;
        let timeLeft = 30;
        let timerId = null;
        const apiKey = "AIzaSyC7LTMVl5pD9G3z3Kqg2klCMqVCi6aGkIU"; // Canvas 환경에서 자동으로 API 키를 제공합니다.

        // Gemini API 호출 함수
        async function callGemini(prompt) {
            loadingSpinner.classList.remove('hidden');
            geminiResponseText.textContent = '';
            
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }] };

            try {
                // Exponential backoff for retries
                let response;
                let retries = 3;
                let delay = 1000;
                while (retries > 0) {
                    response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) break;
                    retries--;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }


                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const result = await response.json();
                const candidate = result.candidates?.[0];
                
                if (candidate && candidate.content?.parts?.[0]?.text) {
                    geminiResponseText.textContent = candidate.content.parts[0].text;
                } else {
                    geminiResponseText.textContent = "죄송합니다, 답변을 생성할 수 없습니다.";
                }
            } catch (error) {
                console.error('Gemini API call failed:', error);
                geminiResponseText.textContent = "오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
            } finally {
                loadingSpinner.classList.add('hidden');
            }
        }

        // AI 점수 평가 가져오기
        function getScoreCommentary() {
            const userScore = score;
            const prompt = `당신은 재치있는 게임 해설가입니다. 사용자가 30초 동안 염소를 클릭하는 게임을 했고, ${userScore}점을 받았습니다. 사용자의 점수에 대해 1~2문장으로 짧고 재미있게 한국어로 칭찬 또는 격려의 메시지를 작성해주세요.`;
            callGemini(prompt);
        }

        // 염소 상식 가져오기
        function getGoatFact() {
            const prompt = "염소에 대한 재미있고 놀라운 상식 한 가지를 어린이도 이해하기 쉽게 한국어로 알려주세요.";
            callGemini(prompt);
        }


        // 게임 시작 함수
        function startGame() {
            score = 0;
            timeLeft = 30;
            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            geminiResponseText.textContent = ''; // 이전 API 응답 초기화

            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            
            moveGoat();

            timerId = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // 게임 종료 함수
        function endGame() {
            clearInterval(timerId);
            gameScreen.classList.add('hidden');
            finalScoreDisplay.textContent = score;
            resultScreen.classList.remove('hidden');
            getScoreCommentary(); // 게임 종료 시 바로 AI 점수 평가 호출
        }

        // 염소 이동 함수
        function moveGoat() {
            const gameAreaWidth = gameArea.clientWidth;
            const gameAreaHeight = gameArea.clientHeight;
            const goatWidth = goat.clientWidth;
            const goatHeight = goat.clientHeight;

            const randomX = Math.random() * (gameAreaWidth - goatWidth);
            const randomY = Math.random() * (gameAreaHeight - goatHeight);

            goat.style.left = `${randomX}px`;
            goat.style.top = `${randomY}px`;
        }

        // 점수 증가 함수
        function incrementScore() {
            score++;
            scoreDisplay.textContent = score;
            moveGoat();
        }

        // 이벤트 리스너 설정
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', () => {
             resultScreen.classList.add('hidden');
             startScreen.classList.remove('hidden');
        });
        goat.addEventListener('click', incrementScore);
        getCommentaryBtn.addEventListener('click', getScoreCommentary);
        getFactBtn.addEventListener('click', getGoatFact);
        
    </script>

</body>
</html>
