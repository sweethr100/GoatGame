<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>염소 클릭 게임 V3 (강화)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="game-container">

        <!-- 시작 화면 -->
        <div id="start-screen" class="screen">
            <h1>염소 클릭 V3</h1>
            <p>30초 동안 염소를 클릭하세요!<br>콤보를 쌓아 피버 모드를 발동시키세요!</p>
            <p class="text-2xl text-yellow-300 font-bold mb-8">최고 점수: <span id="high-score">0</span></p>
            <button id="start-btn" class="btn bg-green-500 hover:bg-green-600">게임 시작</button>
        </div>

        <!-- 게임 화면 -->
        <div id="game-screen" class="screen hidden justify-start items-stretch">
            <div class="hud-panel">
                <div class="hud-item">
                    <span class="hud-label">Score</span>
                    <span id="score" class="hud-value">0</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Combo</span>
                    <span id="combo" class="hud-value text-yellow-400">0</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Time</span>
                    <span id="time" class="hud-value">30</span>
                </div>
            </div>

            <div id="game-area" class="relative flex-grow w-full h-full">
                <img src="goat.jpg" alt="염소" id="goat" class="rounded-full shadow-lg"
                    onerror="this.onerror=null;this.src='https://placegoat.com/100/100';">
                <img src="goat.jpg" alt="황금 염소" id="golden-goat" class="rounded-full shadow-lg hidden"
                    onerror="this.onerror=null;this.src='https://placegoat.com/100/100';">
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="screen hidden">
            <h1 class="text-5xl font-bold text-white mb-4 drop-shadow-md">게임 종료!</h1>
            <p class="text-3xl text-white mb-2">최종 점수: <span id="final-score">0</span>점</p>
            <p class="text-2xl text-yellow-300 font-bold mb-6">최고 점수: <span id="final-high-score">0</span></p>

            <div id="gemini-response-container"
                class="mt-4 p-4 bg-white/20 rounded-lg min-h-[100px] max-w-md mx-auto flex items-center justify-center text-center backdrop-blur-sm border border-white/30">
                <p id="gemini-response-text" class="text-white text-lg"></p>
                <div id="loading-spinner" class="hidden animate-spin rounded-full h-8 w-8 border-b-2 border-white">
                </div>
            </div>

            <div class="flex flex-wrap justify-center gap-4 mt-6">
                <button id="restart-btn" class="btn bg-blue-500 hover:bg-blue-600">다시하기</button>
                <button id="get-commentary-btn" class="btn bg-purple-500 hover:bg-purple-600">✨ 평가 보기</button>
                <button id="get-fact-btn" class="btn bg-teal-500 hover:bg-teal-600">🐐 염소 상식</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
