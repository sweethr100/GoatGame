<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>염소 클릭 게임 V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <style>
        /* 사용자 정의 스타일 */
        body {
            font-family: 'Inter', sans-serif;
            touch-action: manipulation; /* 모바일에서 더블 탭 확대 방지 */
            overflow: hidden;
        }
        .game-container {
            width: 95%;
            max-width: 800px;
            height: 90vh;
            max-height: 700px;
            position: relative;
            overflow: hidden;
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border: 4px solid white;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
            padding: 1rem;
            text-align: center;
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }
        #goat, #golden-goat {
            position: absolute;
            cursor: pointer;
            width: 100px;
            height: 100px;
            user-select: none;
            -webkit-user-drag: none;
            transition: top 0.2s ease-out, left 0.2s ease-out, transform 0.1s ease-in-out;
        }
        #goat:active, #golden-goat:active {
            transform: scale(0.9);
        }
        #golden-goat {
            filter: hue-rotate(40deg) saturate(2) drop-shadow(0 0 15px gold);
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1.125rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        /* 점수 획득 시 텍스트 애니메이션 */
        .floating-text {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            animation: float-up 1s ease-out forwards;
        }
        @keyframes float-up {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-50px);
            }
        }
        /* 점수판 애니메이션 */
        @keyframes score-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }
        .score-popped {
            animation: score-pop 0.3s ease-in-out;
        }
        
        /* 시작 버튼 애니메이션 */
        @keyframes pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.05); }
        }
        .pulse-btn {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="game-container bg-gradient-to-br from-blue-400 to-purple-400 p-4">

        <!-- 시작 화면 -->
        <div id="start-screen" class="screen">
            <h1 class="text-6xl font-bold text-white mb-4 text-center drop-shadow-lg">염소 클릭 V2</h1>
            <p class="text-xl text-white mb-8">30초 안에 염소를 최대한 많이 클릭하세요!</p>
            <p class="text-2xl text-yellow-300 font-bold mb-8">최고 점수: <span id="high-score">0</span></p>
            <button id="start-btn" class="btn bg-green-500 hover:bg-green-600 pulse-btn">게임 시작</button>
        </div>

        <!-- 게임 화면 -->
        <div id="game-screen" class="screen hidden justify-start items-stretch">
            <div class="flex justify-between items-center p-4 bg-white/30 rounded-lg backdrop-blur-sm mb-4">
                <h2 class="text-2xl font-bold text-white">점수: <span id="score">0</span></h2>
                <h2 class="text-2xl font-bold text-white">남은 시간: <span id="time">30</span>초</h2>
            </div>
            <div id="game-area" class="relative flex-grow">
                <img src="goat.jpg" alt="염소" id="goat" class="rounded-full shadow-lg" onerror="this.onerror=null;this.src='https://placegoat.com/100/100';">
                <img src="goat.jpg" alt="황금 염소" id="golden-goat" class="rounded-full shadow-lg hidden" onerror="this.onerror=null;this.src='https://placegoat.com/100/100';">
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="screen hidden">
            <h1 class="text-5xl font-bold text-white mb-4 drop-shadow-md">게임 종료!</h1>
            <p class="text-3xl text-white mb-2">최종 점수: <span id="final-score">0</span>점</p>
            <p class="text-2xl text-yellow-300 font-bold mb-6">최고 점수: <span id="final-high-score">0</span></p>
            
            <div id="gemini-response-container" class="mt-4 p-4 bg-white/20 rounded-lg min-h-[100px] max-w-md mx-auto flex items-center justify-center text-center">
                <p id="gemini-response-text" class="text-white text-lg"></p>
                <div id="loading-spinner" class="hidden animate-spin rounded-full h-8 w-8 border-b-2 border-white"></div>
            </div>

            <div class="flex flex-wrap justify-center gap-4 mt-6">
                <button id="restart-btn" class="btn bg-blue-500 hover:bg-blue-600">다시하기</button>
                <button id="get-commentary-btn" class="btn bg-purple-500 hover:bg-purple-600">✨ 다른 평가 보기</button>
                <button id="get-fact-btn" class="btn bg-teal-500 hover:bg-teal-600">🐐 염소 상식 보기</button>
            </div>
        </div>

    </div>

    <script>
        // 화면 요소
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const resultScreen = document.getElementById('result-screen');
        const gameArea = document.getElementById('game-area');

        // 버튼
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const getCommentaryBtn = document.getElementById('get-commentary-btn');
        const getFactBtn = document.getElementById('get-fact-btn');

        // 디스플레이
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const finalScoreDisplay = document.getElementById('final-score');
        const highScoreDisplay = document.getElementById('high-score');
        const finalHighScoreDisplay = document.getElementById('final-high-score');
        
        // 게임 객체
        const goat = document.getElementById('goat');
        const goldenGoat = document.getElementById('golden-goat');

        // Gemini API 관련 요소
        const geminiResponseText = document.getElementById('gemini-response-text');
        const loadingSpinner = document.getElementById('loading-spinner');

        // 게임 상태 변수
        let score = 0;
        let timeLeft = 30;
        let timerId = null;
        let highScore = localStorage.getItem('goatClickerHighScore') || 0;
        let isGoldenGoatActive = false;
        
        // 사운드 설정
        const synth = new Tone.Synth().toDestination();
        const playBaaSound = () => {
            // 사용자의 상호작용 후 오디오 컨텍스트 시작
            if (Tone.context.state !== 'running') {
                Tone.context.resume();
            }
            synth.triggerAttackRelease("C4", "8n");
        };

        // --- Gemini API 호출 (기존 코드와 동일) ---
        async function callGemini(prompt) {
            loadingSpinner.classList.remove('hidden');
            geminiResponseText.textContent = '';
            // Canvas 환경에서 자동으로 API 키를 제공합니다. 빈 문자열로 두세요.
            const apiKey = "AIzaSyC7LTMVl5pD9G3z3Kqg2klCMqVCi6aGkIU"; 
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-lite-latest:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }] };
            try {
                let response;
                let retries = 3;
                let delay = 1000;
                while (retries > 0) {
                    response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) break;
                    retries--;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
                if (!response.ok) throw new Error(`API Error: ${response.status}`);
                const result = await response.json();
                const candidate = result.candidates?.[0];
                if (candidate && candidate.content?.parts?.[0]?.text) {
                    geminiResponseText.textContent = candidate.content.parts[0].text;
                } else {
                    geminiResponseText.textContent = "죄송합니다, 답변을 생성할 수 없습니다.";
                }
            } catch (error) {
                console.error('Gemini API call failed:', error);
                geminiResponseText.textContent = "오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
            } finally {
                loadingSpinner.classList.add('hidden');
            }
        }
        const getScoreCommentary = () => callGemini(`당신은 재치있는 게임 해설가입니다. 사용자가 30초 동안 염소를 클릭하는 게임을 했고, ${score}점을 받았습니다. 사용자의 점수에 대해 1~2문장으로 짧고 재미있게 한국어로 칭찬 또는 격려의 메시지를 작성해주세요.`);
        const getGoatFact = () => callGemini("염소에 대한 재미있고 놀라운 상식 한 가지를 어린이도 이해하기 쉽게 한국어로 알려주세요.");

        // 최고 점수 업데이트
        function updateHighScoreDisplay() {
            highScoreDisplay.textContent = highScore;
            finalHighScoreDisplay.textContent = highScore;
        }

        // 게임 시작
        function startGame() {
            score = 0;
            timeLeft = 30;
            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            geminiResponseText.textContent = '';

            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            
            moveGoat();

            timerId = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // 게임 종료
        function endGame() {
            clearInterval(timerId);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('goatClickerHighScore', highScore);
            }
            updateHighScoreDisplay();
            
            gameScreen.classList.add('hidden');
            finalScoreDisplay.textContent = score;
            resultScreen.classList.remove('hidden');
            getScoreCommentary();
        }
        
        // 떠다니는 텍스트 생성
        function showFloatingText(x, y, text, color) {
            const floatingText = document.createElement('div');
            floatingText.textContent = text;
            floatingText.className = 'floating-text';
            floatingText.style.left = `${x}px`;
            floatingText.style.top = `${y}px`;
            floatingText.style.color = color;
            gameArea.appendChild(floatingText);

            setTimeout(() => {
                floatingText.remove();
            }, 1000);
        }

        // 염소 이동
        function moveGoat() {
            // 황금 염소 숨기기
            goat.classList.remove('hidden');
            goldenGoat.classList.add('hidden');
            isGoldenGoatActive = false;
            
            // 15% 확률로 황금 염소 등장
            if (Math.random() < 0.15) {
                isGoldenGoatActive = true;
                goat.classList.add('hidden');
                goldenGoat.classList.remove('hidden');
            }

            const targetGoat = isGoldenGoatActive ? goldenGoat : goat;
            const gameAreaRect = gameArea.getBoundingClientRect();
            const goatSize = targetGoat.getBoundingClientRect();

            const randomX = Math.random() * (gameAreaRect.width - goatSize.width);
            const randomY = Math.random() * (gameAreaRect.height - goatSize.height);

            targetGoat.style.left = `${randomX}px`;
            targetGoat.style.top = `${randomY}px`;
        }

        // 점수 증가
        function handleGoatClick(event, points, color) {
            playBaaSound();
            score += points;
            scoreDisplay.textContent = score;
            
            // 점수판 팝 효과
            scoreDisplay.parentElement.classList.remove('score-popped');
            void scoreDisplay.parentElement.offsetWidth; // 리플로우 강제
            scoreDisplay.parentElement.classList.add('score-popped');
            
            // 떠다니는 텍스트 표시
            const gameAreaRect = gameArea.getBoundingClientRect();
            const clickX = event.clientX - gameAreaRect.left;
            const clickY = event.clientY - gameAreaRect.top;
            showFloatingText(clickX, clickY, `+${points}`, color);

            moveGoat();
        }

        // 이벤트 리스너 설정
        document.addEventListener('DOMContentLoaded', () => {
             updateHighScoreDisplay();
        });

        startBtn.addEventListener('click', startGame);
        
        restartBtn.addEventListener('click', () => {
             resultScreen.classList.add('hidden');
             startScreen.classList.remove('hidden');
        });
        
        goat.addEventListener('click', (e) => handleGoatClick(e, 1, 'white'));
        goldenGoat.addEventListener('click', (e) => handleGoatClick(e, 5, 'gold'));

        getCommentaryBtn.addEventListener('click', getScoreCommentary);
        getFactBtn.addEventListener('click', getGoatFact);
        
    </script>

</body>
</html>
